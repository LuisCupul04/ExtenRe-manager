name: 🐞 Bug report
description: Report a bug or an issue.
title: "bug: "
labels: ["Bug report"]
body:
  - type: markdown
    attributes:
      value: |

        # ExtenRe Manager bug report

        Before creating a new bug report, please keep the following in mind:

        - **Do not submit a duplicate bug report**: Search for existing bug reports [here](https://github.com/LuisCupul04/extenre-manager/issues?q=label%3A%22Bug+report%22).
        - **Review the contribution guidelines**: Make sure your bug report adheres to it. You can find the guidelines [here](https://github.com/LuisCupul04/extenre-manager/blob/main/CONTRIBUTING.md).
  - type: textarea
    attributes:
      label: Bug description
      description: |
        - Describe your bug in detail
        - Add steps to reproduce the bug if possible (Step 1. ... Step 2. ...)
        - Add images and videos if possible
        - List used patches if applicable
    validations:
      required: true
  - type: textarea
    attributes:
      label: Version of ExtenRe Manager and version & name of app you are patching
    validations:
      required: true
  - type: dropdown
    attributes:
      label: Installation method
      options:
        - Regular
        - Mount
    validations:
      required: false
  - type: textarea
    attributes:
      label: ExtenRe Manager logs
      description: Export logs from the ReVanced Manager settings.
      render: shell
    validations:
      required: true
  - type: textarea
    attributes:
      label: Patch logs
      description: Export logs from the "Patcher" screen.
      render: shell
    validations:
      required: false
  - type: checkboxes
    id: acknowledgements
    attributes:
      label: Acknowledgements
      description: Your bug report will be closed if you don't follow the checklist below.
      options:
        - label: I have checked all open and closed bug reports and this is not a duplicate.
          required: true
        - label: I have chosen an appropriate title.
          required: true
        - label: All requested information has been provided properly.
          required: true
        - label: The bug is only related to ExtenRe Manager.
          required: true
