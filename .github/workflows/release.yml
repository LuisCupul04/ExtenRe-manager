name: Build ExtenRe Manager APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 🔑 Autenticación para clonar paquetes de GitHub
      - name: Configure Git for GitHub authentication
        run: |
          git config --global url."https://${{ secrets.EXTEN_TOKEN }}@github.com/".insteadOf "https://github.com/"

      # 🧹 Limpiar caché de Pub para evitar referencias antiguas
      - name: Clear Pub cache
        run: |
          rm -rf ~/.pub-cache
          flutter pub cache repair

      - name: Install dependencies
        run: flutter pub get

      # - name: Generate localization files
       # run: flutter gen-l10n

      - name: Analyze project
        run: flutter analyze

      # 🔐 Decodificar keystore si se proporciona (opcional, usando Hoshii_ secrets)
      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.Hoshii_keystoreFile }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks
            echo "Keystore decodificado correctamente"
          else
            echo "No se encontró el secreto Hoshii_keystoreFile. La APK se generará sin firmar."
          fi

      - name: Build APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_ENTRY_ALIAS: ${{ secrets.KEYSTORE_ENTRY_ALIAS }}
          KEYSTORE_ENTRY_PASSWORD: ${{ secrets.KEYSTORE_ENTRY_PASSWORD }}
        run: |
          if [ -f "android/app/keystore.jks" ] && [ -n "$KEYSTORE_PASSWORD" ]; then
            echo "Firmando APK con keystore"
          else
            echo "APK sin firmar (se usará el debug keystore)"
          fi
          flutter build apk --release

      - name: Rename APK
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mv build/app/outputs/flutter-apk/app-release.apk "ExtenRe-Manager-v${VERSION}.apk"

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ExtenRe-Manager-*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ExtenRe-Manager-APK
          path: ExtenRe-Manager-*.apk
          retention-days: 30
