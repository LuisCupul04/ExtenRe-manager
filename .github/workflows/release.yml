name: Build ExtenRe Manager APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Repair Pub cache
        run: flutter pub cache repair

      - name: Install dependencies
        env:
          EXTEN_TOKEN: ${{ secrets.EXTEN_TOKEN }}
        run: |
          # Si hay token, configurar autenticación para paquetes privados
          if [ -n "$EXTEN_TOKEN" ]; then
            mkdir -p ~/.pub-cache
            echo "//pub.dev/:_authToken=$EXTEN_TOKEN" > ~/.pub-cache/credentials.json
            echo "//pub.dartlang.org/:_authToken=$EXTEN_TOKEN" >> ~/.pub-cache/credentials.json
          fi
          flutter pub get --verbose --timeout=120

      - name: Generate localization files
        run: flutter gen-l10n

      - name: Analyze project
        run: flutter analyze

      - name: Build APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_ENTRY_ALIAS: ${{ secrets.KEYSTORE_ENTRY_ALIAS }}
          KEYSTORE_ENTRY_PASSWORD: ${{ secrets.KEYSTORE_ENTRY_PASSWORD }}
        run: |
          if [ -f "android/app/keystore.jks" ] && [ -n "$KEYSTORE_PASSWORD" ]; then
            echo "Firmando APK"
          else
            echo "Sin firma"
          fi
          flutter build apk --release

      - name: Rename APK
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mv build/app/outputs/flutter-apk/app-release.apk "ExtenRe-Manager-v${VERSION}.apk"

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ExtenRe-Manager-*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ExtenRe-Manager-APK
          path: ExtenRe-Manager-*.apk
          retention-days: 30
